services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "until pg_isready -h postgres -U laravel -d laravel; do echo 'Waiting for PostgreSQL...'; sleep 2; done && if [ ! -f .env ] && [ -f .env.example ]; then cp .env.example .env; fi && if ! grep -q '^APP_KEY=base64:' .env 2>/dev/null; then php artisan key:generate --force; fi && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - frontend_node_modules_v4:/app/node_modules
    environment:
      NODE_ENV: development
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    command: sh -c "if [ ! -x node_modules/.bin/nuxt ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 3000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U laravel -d laravel']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  frontend_node_modules_v4:
